<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form | TechReview Hub</title>
  
  <meta name="description" content="Submit a professional product review for the latest tech gear on TechReview Hub.">
  
  <meta name="author" content="Rubia Magdelena Francesco">

  <link rel="stylesheet" href="styles/form.css">
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 15h-2v-2h2zm0-4h-2V7h2z"/>
  </svg>
  <h1>TechReview Hub</h1>
</header>

<main>
  <div class="form-card">
    <h2>Submit a Product Review</h2>
    <p class="subtitle">Share your experience to help others make informed decisions.</p>

    <form method="get" action="review.html" id="reviewForm">

      <div class="field-group">
        <label for="product">Product Name</label>
        <select id="product" name="product" required>
          <option value="" disabled selected>Select a Product ...</option>
          </select>
      </div>

      <hr class="divider">

      <div class="field-group">
        <label>Overall Rating</label>
        <div class="star-group" role="group" aria-label="Rating from 1 to 5 stars">
          <input type="radio" id="star5" name="rating" value="5" required>
          <label for="star5" title="5 stars">&#9733;</label>
          
          <input type="radio" id="star4" name="rating" value="4" required>
          <label for="star4" title="4 stars">&#9733;</label>
          
          <input type="radio" id="star3" name="rating" value="3" required>
          <label for="star3" title="3 stars">&#9733;</label>
          
          <input type="radio" id="star2" name="rating" value="2" required>
          <label for="star2" title="2 stars">&#9733;</label>
          
          <input type="radio" id="star1" name="rating" value="1" required>
          <label for="star1" title="1 star">&#9733;</label>
        </div>
      </div>

      <hr class="divider">

      <div class="field-group">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <hr class="divider">

      <div class="field-group">
        <label>Useful Features <span class="optional">(select all that apply)</span></label>
        <div class="checkbox-group" id="featuresGroup">
          <label><input type="checkbox" name="features" value="durability"> Durability</label>
          <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
          <label><input type="checkbox" name="features" value="performance"> Performance</label>
          <label><input type="checkbox" name="features" value="design"> Design</label>
        </div>
      </div>

      <hr class="divider">

      <div class="field-group">
        <label for="review">Written Review <span class="optional">(optional)</span></label>
        <textarea id="review" name="review" placeholder="Tell us what you think about this product..."></textarea>
      </div>

      <div class="field-group">
        <label for="username">Your Name <span class="optional">(optional)</span></label>
        <input type="text" id="username" name="username" placeholder="e.g. Alex Johnson">
      </div>

      <input type="submit" value="Submit Review" class="submit-btn">
    </form>
  </div>
</main>

<footer>
  <p>&#169;2024 &#127864; Rubia Magdelena Francesco &#127864; Madagascar</p>
  <p>Last Modification: <span id="lastModified"></span></p>
</footer>

<script src="scripts/form.js"></script>

</body>
</html>
